<script>
const API_URL = '';
let records = [];
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

// Avvio diretto senza chiamate bloccanti a finestre di login
async function init() {
  await loadFromServer();
}

async function checkAuth() {
  console.log("Controllo autenticazione rimosso.");
}

async function logout() {
  showToast('Applicazione configurata in modalità pubblica.');
}

async function loadFromServer() {
  try {
    const res = await fetch(API_URL + '/api/records');
    if (!res.ok) throw new Error('HTTP status ' + res.status);
    records = await res.json();
    renderStats();
    renderList();
    showToast('✅ Dati sincronizzati!');
  } catch (err) {
    console.error(err);
    showToast('⚠️ Errore durante il caricamento dei dati dal server');
  }
}

// Inizializza non appena il DOM è pronto
document.addEventListener('DOMContentLoaded', init);
</script>
