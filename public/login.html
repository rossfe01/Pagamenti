<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Gestione Abbonamenti</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%); 
    min-height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
  }
  .login-box { 
    background: white; 
    padding: 40px; 
    border-radius: 16px; 
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
    width: 100%; 
    max-width: 400px; 
    text-align: center; 
  }
  .login-box h1 { 
    color: #1e293b; 
    margin-bottom: 8px; 
    font-size: 1.5rem; 
  }
  .login-box p { 
    color: #64748b; 
    margin-bottom: 30px; 
  }
  .form-group { 
    margin-bottom: 20px; 
    text-align: left; 
  }
  .form-group label { 
    display: block; 
    margin-bottom: 6px; 
    font-weight: 600; 
    color: #475569; 
    font-size: 0.9rem; 
  }
  .form-group input { 
    width: 100%; 
    padding: 12px 16px; 
    border: 2px solid #e2e8f0; 
    border-radius: 10px; 
    font-size: 1rem; 
    transition: border-color 0.2s; 
  }
  .form-group input:focus { 
    outline: none; 
    border-color: #3b82f6; 
  }
  .btn { 
    width: 100%; 
    padding: 14px; 
    border: none; 
    border-radius: 10px; 
    background: #10b981; 
    color: white; 
    font-size: 1rem; 
    font-weight: 600; 
    cursor: pointer; 
    transition: all 0.2s; 
  }
  .btn:hover { 
    background: #059669; 
    transform: translateY(-1px); 
  }
  .error { 
    color: #ef4444; 
    font-size: 0.9rem; 
    margin-top: 15px; 
    display: none; 
  }
  .error.show { 
    display: block; 
  }
  .lock-icon { 
    font-size: 3rem; 
    margin-bottom: 15px; 
  }
</style>
</head>
<body>
  <div class="login-box">
    <div class="lock-icon">🔒</div>
    <h1>Gestione Abbonamenti</h1>
    <p>Inserisci la password per accedere</p>
    <form id="loginForm">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autofocus>
      </div>
      <button type="submit" class="btn">Accedi</button>
      <div class="error" id="error">Password errata</div>
    </form>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    
    if (res.ok) {
      window.location.href = '/app';
    } else {
      document.getElementById('error').classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (err) {
    document.getElementById('error').textContent = 'Errore connessione';
    document.getElementById('error').classList.add('show');
  }
});
</script>
</body>
</html>
