<script>
const API_URL = '';
let records = [];
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

// Avvio dell'applicazione senza blocchi o controlli di sessione
async function init() {
  await loadFromServer();
}

async function checkAuth() {
  // Funzione bypassata per rimuovere la richiesta di login
  console.log("Controllo autenticazione rimosso.");
}

async function logout() {
  showToast('Applicazione configurata in modalità pubblica.');
}

async function loadFromServer() {
  try {
    const res = await fetch(API_URL + '/api/records');
    if (!res.ok) {
      if (res.status === 401) {
        console.warn("Rilevato codice 401 residuo. Ignorato in modalità pubblica.");
      }
      throw new Error('HTTP status ' + res.status);
    }
    records = await res.json();
    renderStats();
    renderList();
    showToast('✅ Dati sincronizzati!');
  } catch (err) {
    console.error(err);
    showToast('⚠️ Errore durante il caricamento dei dati dal server');
  }
}

// Esegui l'inizializzazione non appena il DOM è pronto
document.addEventListener('DOMContentLoaded', init);
